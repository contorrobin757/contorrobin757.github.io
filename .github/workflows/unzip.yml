name: Unzip and Deploy
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip website files
        run: |
          unzip website.zip -d ./public
          # Move everything from public folder to root, ignoring the zip itself
          mv ./public/* . || true 
          rm -rf ./public website.zip

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
